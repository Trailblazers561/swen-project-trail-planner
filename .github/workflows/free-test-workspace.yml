name: Free Test Workspace

on:
  pull_request:
    types: [closed]

env:
  TF_CLOUD_ORGANIZATION: "Trailblazers"
  TF_API_TOKEN: "${{ secrets.TF_API_TOKEN }}"
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: us-east-1
  CONFIG_DIRECTORY: "./terraform"
  TEST_WORKSPACES: ${{ vars.TEST_WORKSPACES }}
  TF_VAR_acm_certificate_arn: '"${{vars.DOMAIN_CERTIFICATE_ARN}}"'
  TF_VAR_ses_identity_arn: '"${{ vars.SES_IDENTITY_ARN }}"'
  TF_VAR_step_ca_version: '"${{ vars.STEP_CA_VERSION }}"'

jobs:
  free-workspace:
    name: Destroy Workspace
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Find Current Workspace
        id: find-workspace
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.VARIABLE_ACCESS_TOKEN }}
          script: |
            const testWorkspaces = JSON.parse(process.env.TEST_WORKSPACES);
            const pr = context.payload.pull_request.number;
            
            // Find Claimed Workspace
            for (const [env, workspace] of Object.entries(testWorkspaces)) {
              if (workspace.pr === pr) {
                core.setOutput("envName", env);
                core.setOutput("workspace_name", workspace.workspace_name);
                core.setOutput("workspace_id", workspace.workspace_id);
                return;
              }
            }

            // No Workspace Claimed
            core.setFailed(`No Workspace Found For PR #${pr}.`);
            return;

      - name: Export Variables
        run: |
          echo 'TF_VAR_deploy_env="${{ steps.find-workspace.outputs.envName }}"' >> "$GITHUB_ENV"
          echo 'TF_WORKSPACE=${{ steps.find-workspace.outputs.workspace_name }}' >> "$GITHUB_ENV"
          echo 'TF_WORKSPACE_ID=${{ steps.find-workspace.outputs.workspace_id }}' >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python Requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tests/requirements.txt
          python -m pip install --no-compile --no-binary :all: -r lambdas/lambda_authorizer/requirements.txt -t lambdas/layers/auth_reqs/python
          mkdir -p lambdas/layers/helper/python/helper
          cp lambdas/helper/helper_functions.py lambdas/layers/helper/python/helper
          python -m pip install --no-compile --only-binary=:all: --implementation cp --platform manylinux2014_x86_64 --python-version 3.12 -r lambdas/helper/requirements.txt -t lambdas/layers/helper/python 

      - name: Setup Terraform Folder
        run: |
          mkdir -p terraform/lambdas
          cp -r lambdas/* terraform/lambdas/
          mkdir -p terraform/swen-project-react-app
          cp -r swen-project-react-app/* terraform/swen-project-react-app/
          mkdir -p terraform/tests
          cp -r tests/* terraform/tests/
          mkdir -p terraform/sample_data
          cp -r sample_data/* terraform/sample_data/

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Create Destroy Run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.3.0
        id: destroy-run
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          is_destroy: true
        if: ${{ always() }}

      - name: Destroy
        uses: hashicorp/tfc-workflows-github/actions/apply-run@v1.3.0
        with:
          run: ${{ steps.destroy-run.outputs.run_id }}
        if: ${{ always() && fromJSON(steps.destroy-run.outputs.payload).data.attributes.actions.IsConfirmable }}

      - name: Free Workspace
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.VARIABLE_ACCESS_TOKEN }}
          script: |
            const testWorkspaces = JSON.parse(process.env.TEST_WORKSPACES);
            const pr = context.payload.pull_request.number;

            // Find And Free Claimed Workspace
            let freedWorkspace = null;

            for (const workspace of Object.values(testWorkspaces)) {
              if (workspace.pr === pr) {
                workspace.pr = null;
                freedWorkspace = workspace;
                break;
              }
            }

            // No Claimed Workspace Found
            if (!freedWorkspace) {
              core.setFailed(`No workspace found for PR #${pr}.`);
              return;
            }

            // Update Repo Variable To Free Workspace
            await github.rest.actions.updateRepoVariable({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: "TEST_WORKSPACES",
              value: JSON.stringify(testWorkspaces),
            });

            core.info(`Freed ${freedWorkspace.workspace_name}.`);