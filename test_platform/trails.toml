# Trail Counter — Trail Definitions and Seasonality Configuration
#
# daily_hikers = summer_weekday_hikers × season_multiplier × dow_multiplier × weather_multiplier
#
# Season boundaries (computed each year):
#   winter : Jan 1        – Mar 14
#   spring : Mar 15       – day before Memorial Day  (last Mon of May)
#   summer : Memorial Day – Columbus Day              (2nd Mon of Oct)
#   fall   : day after Columbus Day – Dec 31
#
# Per-trail options:
#   device_id             — device ID used by populate.py for this trail
#   zero_day_probability  — chance of zero hikers regardless of other multipliers
#   fixed_seed            — integer; when set, data for this trail is fully reproducible

[weather]
bad_day_probability    = 0.2
bad_day_min_multiplier = 0.2
bad_day_max_multiplier = 0.75

[season_multipliers]
winter = 0.3
spring = 0.1
summer = 1.0
fall   = 0.1

[dow_multipliers]
monday    = 1.0
tuesday   = 1.0
wednesday = 1.0
thursday  = 1.5
friday    = 2.0
saturday  = 4.0
sunday    = 4.0

