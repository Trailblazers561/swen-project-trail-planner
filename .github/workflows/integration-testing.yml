name: "Integration Testing"

on:
  pull_request:
    branches:
      - trailblazers-tst
      - trailblazers-uat
      - trailblazers-prod

env:
  TF_CLOUD_ORGANIZATION: "Trailblazers"
  TF_API_TOKEN: "${{ secrets.TF_API_TOKEN }}"
  TF_WORKSPACE: "test-workplace"
  TF_WORKSPACE_ID: "ws-LG99RLWhhrv1UV1y"
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: us-east-1
  TF_VAR_deploy_env: '"test"'
  CONFIG_DIRECTORY: "./terraform"

jobs:
  terraform:
    name: "Integration Testing"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python Requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tests/requirements.txt
          python -m pip install --no-compile --no-binary :all: -r lambdas/lambda_authorizer/requirements.txt -t lambdas/layers/auth_reqs/python

      - name: Setup Terraform Folder
        run: |
          mkdir -p terraform/lambdas
          cp -r lambdas/* terraform/lambdas/
          mkdir -p terraform/swen-project-react-app
          cp -r swen-project-react-app/* terraform/swen-project-react-app/
          mkdir -p terraform/tests
          cp -r tests/* terraform/tests/
          mkdir -p terraform/sample_data
          cp -r sample_data/* terraform/sample_data/

      - name: Upload Configuration
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.3.0
        id: apply-upload
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          directory: ${{ env.CONFIG_DIRECTORY }}

      - name: Create Apply Run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.3.0
        id: apply-run
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          configuration_version: ${{ steps.apply-upload.outputs.configuration_version_id }}

      - name: Apply
        uses: hashicorp/tfc-workflows-github/actions/apply-run@v1.3.0
        if: fromJSON(steps.apply-run.outputs.payload).data.attributes.actions.IsConfirmable
        id: apply
        with:
          run: ${{ steps.apply-run.outputs.run_id }}

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Add React Files To React Bucket
        run: |
          BUCKET_NAME=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.TF_API_ORG_TOKEN }}" \
            -H "Content-Type: application/vnd.api+json" \
            "https://app.terraform.io/api/v2/workspaces/${{ env.TF_WORKSPACE_ID }}/current-state-version?include=outputs" \
            | jq -r '.included[] | select(.type == "state-version-outputs" and .attributes.name == "react_bucket_name") | .attributes.value')
          
          cd swen-project-react-app
          python setup_env.py --env ${{ env.TF_VAR_deploy_env }}
          npm install
          npm run build
          aws s3 sync ./dist s3://$BUCKET_NAME --delete

      - name: Install Chrome
        run: |
          sudo apt update
          sudo apt install -y google-chrome-stable

      - name: Install Dependiencies And Test
        run: |
          python sample_data/load_test_data.py --env ${{ env.TF_VAR_deploy_env }}
          python tests/setup_env.py --env ${{ env.TF_VAR_deploy_env }}
          pytest -s tests/ -m UI --doctest-modules --junitxml=junit/test-results-ui.xml --cov=com --cov-report=xml --cov-report=html

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
            name: pytest-results
            path: junit/test-results-*.xml
        if: ${{ always() }}

      - name: Upload Error Screenshots
        uses: actions/upload-artifact@v4
        with:
            name: error-screenshots
            path: tests/ui_tests/errors/*.png
            if-no-files-found: ignore
        if: ${{ always() }}

      - name: Install dependencies for GitHub Script
        run: npm install xml2js
        if: ${{ always() }}

      - name: Update PR
        uses: actions/github-script@v6
        id: plan-comment
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Retrieve existing bot comments for the PR
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' && comment.body.includes('Integration Testing Output')
            });
            // Delete previous comment so PR timeline makes sense
            if (botComment) {
              github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
              });
            }

            const fs = require('fs');
            const xml2js = require('xml2js');

            const files = ['junit/test-results-ui.xml', 'junit/test-results-api.xml'];

            const total = 0;
            const failed = 0;
            const errored = 0;
            const skipped = 0;
            const time = 0;

            for (const file of files) {
              const xmlData = fs.readFileSync('junit/test-results.xml', 'utf-8');
              const result = await xml2js.parseStringPromise(xmlData);

              const testsuite = result.testsuites.testsuite[0];

              if (!testsuite || !testsuite.$) {
                throw new Error("Could not find testsuite");
              }

              total += parseInt(testsuite.$.tests || 0);
              failed += parseInt(testsuite.$.failures || 0);
              errored += parseInt(testsuite.$.errors || 0);
              skipped += parseInt(testsuite.$.skipped || 0);
              time += parseFloat(testsuite.$.time || 0);

              // const total = parseInt(testsuite.$.tests || 0);
              // const failed = parseInt(testsuite.$.failures || 0);
              // const errored = parseInt(testsuite.$.errors || 0);
              // const skipped = parseInt(testsuite.$.skipped || 0);
              // const passed = total - failed - errored - skipped;
              // const time = parseFloat(testsuite.$.time || 0);
            }
            const passed = total - failed - errored - skipped;

            const output = `#### Integration Testing Output
            \`\`\`
            ${passed} passed, ${failed} failed, ${errored} errored, ${skipped} skipped, in ${time}s
            \`\`\`
            [Test Results](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
        if: ${{ always() }}

      # - name: Create Destroy Run
      #   uses: hashicorp/tfc-workflows-github/actions/create-run@v1.3.0
      #   id: destroy-run
      #   with:
      #     workspace: ${{ env.TF_WORKSPACE }}
      #     is_destroy: true
      #   if: ${{ always() }}

      # - name: Destroy
      #   uses: hashicorp/tfc-workflows-github/actions/apply-run@v1.3.0
      #   with:
      #     run: ${{ steps.destroy-run.outputs.run_id }}
      #   if: ${{ always() && fromJSON(steps.destroy-run.outputs.payload).data.attributes.actions.IsConfirmable }}