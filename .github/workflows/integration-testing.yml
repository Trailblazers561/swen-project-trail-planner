name: "Integration Testing"

on:
  pull_request:
    branches:
      - trailblazers-tst
      - trailblazers-uat
      - main

env:
  TF_CLOUD_ORGANIZATION: "Trailblazers"
  TF_API_TOKEN: "${{ secrets.TF_API_TOKEN }}"
  TF_WORKSPACE: "demo-workplace"
  TF_WORKSPACE_ID: "ws-ghbbVVgtFD7ZkxG1"
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: us-east-1
  TF_VAR_deploy_env: '"demo"'
  CONFIG_DIRECTORY: "./terraform"
  TF_VAR_ses_identity_arn: '"${{vars.SES_IDENTITY_ARN}}"'
  TF_VAR_step_ca_version: '"${{ vars.STEP_CA_VERSION }}"'

jobs:
  terraform:
    name: "Integration Testing"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python Requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tests/requirements.txt
          python -m pip install --no-compile --no-binary :all: -r lambdas/lambda_authorizer/requirements.txt -t lambdas/layers/auth_reqs/python
          mkdir -p lambdas/layers/helper/python/helper
          cp lambdas/helper/helper_functions.py lambdas/layers/helper/python/helper
          python -m pip install --no-compile --only-binary=:all: --implementation cp --platform manylinux2014_x86_64 --python-version 3.12 -r lambdas/helper/requirements.txt -t lambdas/layers/helper/python 

      - name: Setup Terraform Folder
        run: |
          mkdir -p terraform/lambdas
          cp -r lambdas/* terraform/lambdas/
          mkdir -p terraform/swen-project-react-app
          cp -r swen-project-react-app/* terraform/swen-project-react-app/
          mkdir -p terraform/tests
          cp -r tests/* terraform/tests/
          mkdir -p terraform/sample_data
          cp -r sample_data/* terraform/sample_data/

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Create Destroy Run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.3.0
        id: destroy-run
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          is_destroy: true
        if: ${{ always() }}

      - name: Destroy
        uses: hashicorp/tfc-workflows-github/actions/apply-run@v1.3.0
        with:
          run: ${{ steps.destroy-run.outputs.run_id }}
        if: ${{ always() && fromJSON(steps.destroy-run.outputs.payload).data.attributes.actions.IsConfirmable }}