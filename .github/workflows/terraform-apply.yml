name: "Terraform Apply"

on:
  push:
    branches:
      - trailblazers-tst
      - trailblazers-uat
      - trailblazers-prod

env:
  TF_CLOUD_ORGANIZATION: "Trailblazers"
  TF_API_TOKEN: "${{ secrets.TF_API_TOKEN }}"
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: us-east-1
  CONFIG_DIRECTORY: "./terraform"
  TF_VAR_acm_certificate_arn: '"${{vars.DOMAIN_CERTIFICATE_ARN}}"'
  TF_VAR_ses_identity_arn: '"${{vars.SES_IDENTITY_ARN}}"'
  TF_VAR_user_passwords: '"${{ secrets.USER_PASSWORDS }}"'
  TF_VAR_step_ca_version: '"${{ vars.STEP_CA_VERSION }}"'

jobs:
  terraform-apply:
    name: | 
      ${{ 
          github.ref_name == 'trailblazers-tst' && 'TST Apply' ||
          github.ref_name == 'trailblazers-uat' && 'UAT Apply' ||
          github.ref_name == 'trailblazers-prod' && 'PROD Apply'
        }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: | 
      ${{ 
          github.ref_name == 'trailblazers-tst' && 'tst' ||
          github.ref_name == 'trailblazers-uat' && 'uat' ||
          github.ref_name == 'trailblazers-prod' && 'prod'
        }}
    env:
      TF_WORKSPACE: "${{ vars.TF_WORKSPACE }}"
      TF_WORKSPACE_ID: "${{ vars.TF_WORKSPACE_ID }}"
      TF_VAR_deploy_env: '"${{ vars.ENV_NAME }}"'
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python Requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tests/requirements.txt
          python -m pip install --no-compile --no-binary :all: -r lambdas/lambda_authorizer/requirements.txt -t lambdas/layers/auth_reqs/python
          mkdir -p lambdas/layers/helper/python/helper
          cp lambdas/helper/helper_functions.py lambdas/layers/helper/python/helper
          python -m pip install --no-compile --only-binary=:all: --implementation cp --platform manylinux2014_x86_64 --python-version 3.12 -r lambdas/helper/requirements.txt -t lambdas/layers/helper/python 

      - name: Setup Terraform Folder
        run: |
          mkdir -p terraform/lambdas
          cp -r lambdas/* terraform/lambdas/
          mkdir -p terraform/swen-project-react-app
          cp -r swen-project-react-app/* terraform/swen-project-react-app/
          mkdir -p terraform/sample_data
          cp -r sample_data/* terraform/sample_data/

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Start ECR Push Background Job
        run: python scripts/push_step_ca.py ${{ env.TF_VAR_deploy_env }} ${{ vars.STEP_CA_VERSION }} > /tmp/ecr_push.log 2>&1 & echo $! > /tmp/ecr_push.pid

      - name: Upload Configuration
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.3.0
        id: apply-upload
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          directory: ${{ env.CONFIG_DIRECTORY }}

      - name: Create Apply Run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.3.0
        id: apply-run
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          configuration_version: ${{ steps.apply-upload.outputs.configuration_version_id }}

      - name: Apply
        uses: hashicorp/tfc-workflows-github/actions/apply-run@v1.3.0
        if: fromJSON(steps.apply-run.outputs.payload).data.attributes.actions.IsConfirmable
        id: apply
        with:
          run: ${{ steps.apply-run.outputs.run_id }}
          comment: "Apply Run from GitHub Actions CI ${{ github.sha }}"

      - name: Wait for ECR Push
        run: |
          echo "Waiting for ECR push to complete"
          while [ ! -f /tmp/ecr_done ]; do
            sleep 10
          done
          cat /tmp/ecr_push.log
          RESULT=$(cat /tmp/ecr_done)
          if [ "$RESULT" != "success" ]; then
            echo "ECR push failed: $RESULT"
            exit 1
          fi
          echo "ECR push completed successfully"

      - name: Add React Files To React Bucket
        run: |
          BUCKET_NAME=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.TF_API_ORG_TOKEN }}" \
            -H "Content-Type: application/vnd.api+json" \
            "https://app.terraform.io/api/v2/workspaces/${{ env.TF_WORKSPACE_ID }}/current-state-version?include=outputs" \
            | jq -r '.included[] | select(.type == "state-version-outputs" and .attributes.name == "react_bucket_name") | .attributes.value')
          DISTRIBUTION_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.TF_API_ORG_TOKEN }}" \
            -H "Content-Type: application/vnd.api+json" \
            "https://app.terraform.io/api/v2/workspaces/${{ env.TF_WORKSPACE_ID }}/current-state-version?include=outputs" \
            | jq -r '.included[] | select(.type == "state-version-outputs" and .attributes.name == "distribution_id") | .attributes.value')
          
          cd swen-project-react-app
          python setup_env.py --env ${{ env.TF_VAR_deploy_env }}
          npm install
          npm run build
          aws s3 sync ./dist s3://$BUCKET_NAME --delete
          aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths "/*"